<!DOCTYPE html>
<html>

<head>
<title>Search Flights</title>
<link rel="stylesheet" href="style.css">

<style>

/* DARK DASHBOARD */

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
color:white;
font-family:'Segoe UI',sans-serif;
margin:0;
}

/* HERO */

.hero{
text-align:center;
padding:60px 20px;
}

/* SEARCH FORM */

form{
background:#0f172a;
padding:30px;
border-radius:12px;
max-width:500px;
margin:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input,select{
padding:8px;
border-radius:6px;
border:none;
}

/* BUTTON */

.btn{
background:linear-gradient(90deg,#36d1dc,#5b86e5);
padding:10px 20px;
border-radius:8px;
border:none;
color:white;
cursor:pointer;
}

/* RESULTS */

.results{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:40px;
}

/* FLIGHT CARD */

.flight-card{
background:#0f172a;
padding:25px;
border-radius:12px;
width:260px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.3s;
}

.flight-card:hover{
transform:translateY(-6px);
}

.price{
font-size:22px;
color:#38bdf8;
}

/* CHEAPEST */

.cheapest{
border:2px solid #22c55e;
}

/* FILTERS */

.filters{
margin-top:40px;
text-align:center;
}

</style>

</head>

<body>

<header>

<h1>✈ Flight Price Agent</h1>

<nav>
<a href="index.html">Home</a>
<a href="search.html">Search Flights</a>
<a href="dashboard.html">Analytics</a>
<a href="login.html">Login</a>
</nav>

</header>


<section class="hero">

<h2>Search Available Flights</h2>

<form id="searchForm">

<label>From City:</label>
<input type="text" id="from" list="airports" placeholder="Enter airport" required>

<button type="button" onclick="swapCities()">🔁</button>

<br><br>

<label>To City:</label>
<input type="text" id="to" list="airports" placeholder="Enter airport" required>

<br><br>

<datalist id="airports">

<option value="Bangalore - BLR">
<option value="Delhi - DEL">
<option value="Mumbai - BOM">
<option value="Cochin - COK">
<option value="Dubai - DXB">
<option value="Singapore - SIN">
<option value="London - LHR">
<option value="New York - JFK">

</datalist>

<label>Departure Date:</label>
<input type="date" id="date" required>

<br><br>

<label>Return Date:</label>
<input type="date" id="return">

<br><br>

<label>Passengers:</label>
<select id="passengers">
<option>1 Passenger</option>
<option>2 Passengers</option>
<option>3 Passengers</option>
<option>4 Passengers</option>
</select>

<br><br>

<label>Class:</label>
<select id="class">
<option>Economy</option>
<option>Business</option>
<option>First Class</option>
</select>

<br><br>

<label>Preferred Airline:</label>
<select id="airline">
<option>All Airlines</option>
<option>Indigo</option>
<option>Air India</option>
<option>Vistara</option>
</select>

<br><br>

<button type="button" class="btn" onclick="startSearch()">Search</button>

</form>

<div id="loading" style="display:none;text-align:center;margin-top:20px;">
<h3>🔎 Searching best flights...</h3>
</div>

<div class="filters">

<h3>Price Filter</h3>

<input type="range" id="priceRange" min="3000" max="7000" value="7000" oninput="updatePrice()">

<span id="priceValue">₹7000</span>

</div>

<div id="prediction" style="margin-top:20px;text-align:center;"></div>

<div id="flightResults" class="results"></div>

<!-- ✅ ADDED BUTTON -->
<div style="text-align:center; margin-top:30px;">
<button class="btn" onclick="goToDeals()">🔥 View Best Deals</button>
</div>

</section>


<script>

/* SWAP CITIES */

function swapCities(){

let from=document.getElementById("from");
let to=document.getElementById("to");

let temp=from.value;
from.value=to.value;
to.value=temp;

}

/* PRICE FILTER */

function updatePrice(){
document.getElementById("priceValue").innerText="₹"+document.getElementById("priceRange").value;
}

/* SEARCH LOADING */

function startSearch(){

document.getElementById("loading").style.display="block";

setTimeout(function(){

document.getElementById("loading").style.display="none";

searchFlights();

},1500);

}


/* SEARCH FLIGHTS */

function searchFlights(){

var from=document.getElementById("from").value;
var to=document.getElementById("to").value;

var maxPrice=document.getElementById("priceRange").value;

var results=document.getElementById("flightResults");

let flights=[

{airline:"Indigo",time:"10:30 AM",price:4500,seats:4,co2:"Low 🌱",duration:"1h 50m"},

{airline:"Air India",time:"12:15 PM",price:5200,seats:6,co2:"Medium",duration:"2h 10m"},

{airline:"Vistara",time:"02:00 PM",price:4800,seats:3,co2:"Low 🌱",duration:"1h 45m"}

];

let cheapest=Math.min(...flights.map(f=>f.price));

results.innerHTML="";

flights.forEach(f=>{

if(f.price<=maxPrice){

results.innerHTML+=`

<div class="flight-card ${f.price==cheapest ? 'cheapest':''}">

<h3>✈ ${f.airline}</h3>

<p>${from} → ${to}</p>

<p>Departure: ${f.time}</p>

<p>Duration: ${f.duration}</p>

<p>Seats Left: ${f.seats}</p>

<p>CO₂: ${f.co2}</p>

<p class="price">₹${f.price}</p>

${f.price==cheapest ? "<p style='color:#22c55e'>⭐ Cheapest Flight</p>" : ""}

<button class="btn" onclick="bookFlight('${f.airline}','${from} → ${to}','${f.time}','₹${f.price}')">Book Now</button>

</div>

`;

}

});

/* PRICE PREDICTION */

let prediction="";

if(cheapest<5000)
prediction="📈 Prices may increase soon — book now!";
else
prediction="📉 Prices may drop next week.";

document.getElementById("prediction").innerHTML="<h3>"+prediction+"</h3>";

}


/* BOOK FLIGHT */

function bookFlight(airline,route,time,price){

let bookings=JSON.parse(localStorage.getItem("bookings")) || [];

bookings.push({
airline:airline,
route:route,
time:time,
price:price
});

localStorage.setItem("bookings",JSON.stringify(bookings));

let confirmBooking=confirm("Flight booked successfully! View in My Bookings?");

if(confirmBooking){
window.location.href="bookings.html";
}

}

/* ✅ ADDED FUNCTION */
function goToDeals(){
window.location.href="deals.html";
}

</script>
</body>
</html>
