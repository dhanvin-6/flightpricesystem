<!DOCTYPE html>
<html>

<head>

<title>User Login</title>
<link rel="stylesheet" href="style.css">

<style>

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);
color:white;
font-family:'Segoe UI',sans-serif;
margin:0;
}

/* LOGIN BOX */
.login-box{
background:#0f172a;
width:350px;
padding:30px;
border-radius:12px;
margin:auto;
margin-top:80px;
box-shadow:0 12px 30px rgba(0,0,0,0.5);
}

.login-box h2{
text-align:center;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:none;
}

/* BUTTON */
.btn{
background:linear-gradient(90deg,#36d1dc,#5b86e5);
border:none;
padding:10px 20px;
border-radius:6px;
color:white;
cursor:pointer;
width:100%;
}

.btn:hover{
opacity:0.9;
}

/* SIGNUP TEXT */
.signup-text{
text-align:center;
margin-top:10px;
cursor:pointer;
color:#38bdf8;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-box{
background:#0f172a;
padding:25px;
border-radius:10px;
width:300px;
}

.close{
float:right;
cursor:pointer;
color:white;
}

</style>

</head>

<body>

<header>

<h1>✈ Flight Price Agent</h1>

<nav>
<a href="index.html">Home</a> 
<a href="search.html">Search Flights</a> 
<a href="dashboard.html">Analytics</a> 
<a href="login.html">Login</a>
</nav>

</header>

<!-- LOGIN FORM -->
<div class="login-box">

<h2>User Login</h2>

<input id="username" placeholder="Enter Username">

<input id="password" type="password" placeholder="Enter Password">

<button class="btn" onclick="login()">Login</button>

<p class="signup-text" onclick="openModal()">New user? Sign up</p>

</div>

<!-- SIGNUP MODAL -->
<div class="modal" id="signupModal">

<div class="modal-box">
<span class="close" onclick="closeModal()">✖</span>

<h3>Sign Up</h3>

<input id="newUser" placeholder="Username">
<input id="newPass" type="password" placeholder="Password">

<button class="btn" onclick="register()">Register</button>

</div>
</div>

<script>

// 🔐 LOGIN FUNCTION (HYBRID)
function login(){

let user = document.getElementById("username").value.trim();
let pass = document.getElementById("password").value.trim();

// TRY BACKEND FIRST
fetch("http://127.0.0.1:5000/login-check", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username:user, password:pass})
})
.then(res => res.json())
.then(data => {

    if(data.status === "success"){
        alert("Login Successful (DB) ✅");
        window.location.href = "index.html";
    }
    else{
        fallbackLogin(user, pass);
    }

})
.catch(() => {
    fallbackLogin(user, pass);
});

// 🔁 FALLBACK LOGIN
function fallbackLogin(user, pass){

let storedPass = localStorage.getItem(user);

if((user === "admin" && pass === "1234") || storedPass === pass){
    alert("Login Successful (Local) ✅");
    window.location.href = "index.html";
}
else{
    alert("Invalid Login ❌");
}

}

}


// 🧾 REGISTER FUNCTION (HYBRID)
function register(){

let user = document.getElementById("newUser").value.trim();
let pass = document.getElementById("newPass").value.trim();

if(user === "" || pass === ""){
    alert("Fill all fields");
    return;
}

// TRY BACKEND
fetch("http://127.0.0.1:5000/register-user", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username:user, password:pass})
})
.then(res => res.json())
.then(data => {

    if(data.status === "success"){
        alert("Registered in DB ✅");
    }
    else{
        alert("User already exists in DB");
    }

})
.catch(() => {
    localStorage.setItem(user, pass);
    alert("Registered locally ✅");
});

closeModal();

}


// MODAL CONTROL
function openModal(){
document.getElementById("signupModal").style.display = "flex";
}

function closeModal(){
document.getElementById("signupModal").style.display = "none";
}

</script>

</body>
</html>
